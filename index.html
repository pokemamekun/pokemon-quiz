<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ポケモン図鑑クイズ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- スマホロトム風のデバイス外枠 -->
  <div id="rotom-phone">
    
    <!-- ロトムの目（上部） -->
    <div id="rotom-top">
      <div class="rotom-eye"></div>
    </div>

    <!-- 画面部分 -->
    <div id="rotom-screen">
      
      <!-- ==============================
           メニュー画面 
           ============================== -->
      <div id="menu-screen" class="screen active">
        <div style="text-align: center; margin-bottom: -15px; margin-top: -10px;">
          <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/25.png" style="width: 80px; image-rendering: pixelated; filter: brightness(0) invert(0.8);">
        </div>
        <h2 style="font-size: 18px; white-space: nowrap; margin-bottom: 20px;">ポケモンシルエットクイズ</h2>
        
        <div class="menu-group">
          <label for="mode-select">ゲームモード</label>
          <select id="mode-select">
            <option value="normal">ノーマル（じっくり）</option>
            <option value="normal-hard">ハード（じっくり・姿なし）</option>
            <option value="timeAttack">タイムアタック（60秒）</option>
            <option value="timeAttack-hard">タイムアタック ハード（姿なし）</option>
          </select>
          
          <label for="gen-select">出題範囲</label>
          <select id="gen-select">
            <option value="all">ぜんこく図鑑（すべて）</option>
            <option value="gen1">第1世代（カントー）</option>
            <option value="gen2">第2世代（ジョウト）</option>
            <option value="gen3">第3世代（ホウエン）</option>
            <option value="gen4">第4世代（シンオウ）</option>
            <option value="gen5">第5世代（イッシュ）</option>
            <option value="gen6">第6世代（カロス）</option>
            <option value="gen7">第7世代（アローラ）</option>
            <option value="gen8">第8世代（ガラル・ヒスイ）</option>
            <option value="gen9">第9世代（パルデア）</option>
          </select>
        </div>
        
        <button id="start-btn">スタート！</button>
        <div class="rank-criteria" style="margin-top: 15px; font-size: 10px; color: #a4b0be; text-align: left; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 5px; line-height: 1.5;">
          <strong>【タイムアタック時のランク基準（正解数）】</strong><br>
          <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/master-ball.png" style="width:16px; vertical-align:middle; margin-right:4px;"> マスターボール級: 10問以上<br>
          <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/ultra-ball.png" style="width:16px; vertical-align:middle; margin-right:4px;"> ハイパーボール級: 7問以上<br>
          <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/great-ball.png" style="width:16px; vertical-align:middle; margin-right:4px;"> スーパーボール級: 5問以上<br>
          <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png" style="width:16px; vertical-align:middle; margin-right:4px;"> モンスターボール級: 4問以下
        </div>
      </div>

      <!-- ==============================
           ゲーム画面 
           ============================== -->
      <div id="game-screen" class="screen">
        
        <div class="game-header">
          <button id="back-to-menu-btn" style="padding: 4px 8px; font-size: 10px; margin: 0; background: #747d8c; color: white;">◀ メニューへ</button>
          <span id="score-display" style="margin-left: auto; margin-right: 10px;">正解数: 0</span>
          <span id="timer-display" style="display:none; align-items:center;"></span>
        </div>

        <div class="pokemon-display">
          <div id="hard-mode-question" style="display:none; font-size:80px; position:absolute; color:#747d8c; font-family:sans-serif; font-weight:bold;">？</div>
          <img id="pokemon-img" class="silhouette" src="" alt="">
        </div>

        <h3 id="message-box" style="text-align:center; margin:0 0 10px 0; font-size:16px;">だーれだ？</h3>

        <div id="default-info">
          <div style="display:flex; justify-content:space-between; align-items: center; margin-bottom: 5px; width: 100%; white-space: nowrap;">
            <div id="number-display" style="font-weight: bold; color: #ffda79; font-size: 12px; flex-shrink: 0;"></div>
            <div id="genus-display" style="font-weight: bold; color: #ffda79; font-size: 11px; flex-shrink: 1; overflow: hidden; text-overflow: ellipsis; margin: 0 4px;"></div>
            <div id="region-display" style="font-weight: bold; color: #7bed9f; font-size: 10px; flex-shrink: 0;"></div>
          </div>
          <div id="type-display" style="margin-bottom: 8px; display: flex; gap: 4px; flex-wrap: wrap;"></div>
          <div id="desc-display"></div>
        </div>

        <div class="input-area">
          <input type="text" id="answer-input" placeholder="ポケモンのなまえ" autocomplete="off">
          <ul id="suggestions"></ul>
        </div>
        
        <button id="submit-btn">こたえる！</button>
        <button id="next-btn" style="display:none; background:#7bed9f;">つぎへ！</button>

      </div>

      <!-- ==============================
           リザルト画面 
           ============================== -->
      <div id="result-screen" class="screen">
        <h2>けっかひょう</h2>
        <div class="result-stats">
          <div id="final-rank" style="font-size: 24px; color: #ffda79; margin-bottom: 20px; text-shadow: 2px 2px 0 #2f3542;"></div>
          <div id="final-score">正解数: 0</div>
        </div>
        
        <div style="display:flex; flex-direction:column; gap:10px;">
          <button id="share-x-btn" style="background:#1da1f2; color:#fff; border-color:#2f3542; display: flex; align-items: center; justify-content: center; gap: 8px;">
            <svg viewBox="0 0 24 24" style="width:16px; height:16px; fill:currentColor;"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            結果をシェアする
          </button>
          <button id="play-again-btn">もういちど遊ぶ</button>
        </div>
      </div>

    </div> <!-- rotom-screen 終了 -->
  </div> <!-- rotom-phone 終了 -->

  <!-- スクリプトの読み込み -->
  <script src="data.js"></script>
  <script src="game.js"></script>
</body>
</html>
